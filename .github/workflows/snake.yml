name: Generate Snake Game

on:
  # Automatically runs every 24 hours
  schedule:
    - cron: "0 0 * * *"
  
  # Allows you to manually trigger it whenever you want
  workflow_dispatch:

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the snake animation from your contributions
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Omr-123
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # Pushes the generated snake.svg file to a clean branch
      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: snake-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
